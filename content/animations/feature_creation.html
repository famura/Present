<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>3D Feature Creation Animation</title>
		<script src="https://d3js.org/d3.v7.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
		<style>
			body {
				margin: 0;
			}
			canvas {
				display: block;
			}
		</style>
	</head>
	<body>
		<div class="fig-container" data-file="feature_creation.html"></div>
		<script>
			const width = window.innerWidth;
			const height = window.innerHeight;

			// Create a scene
			const scene = new THREE.Scene();
			const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
			const renderer = new THREE.WebGLRenderer({ alpha: true });
			renderer.setSize(width, height);
			document.body.appendChild(renderer.domElement);

			// Create spheres
			const colors = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00];
			const spheres = [];
			const sphereGeometry = new THREE.SphereGeometry(0.2, 32, 32);

			colors.forEach((color, index) => {
				const material = new THREE.MeshStandardMaterial({ color: color, flatShading: true });
				const sphere = new THREE.Mesh(sphereGeometry, material);
				sphere.position.set(-2, 0, 0); // Position them on the left
				spheres.push(sphere);
				scene.add(sphere);
			});

			// Create a big white sphere
			const bigSphereMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, flatShading: true });
			const bigSphere = new THREE.Mesh(sphereGeometry.clone().scale(2, 2, 2), bigSphereMaterial);
			scene.add(bigSphere);
			bigSphere.visible = false; // Initially hidden

			camera.position.z = 5;

			// Add a light source for shading
			const light = new THREE.DirectionalLight(0xffffff, 1);
			light.position.set(5, 5, 5).normalize();
			scene.add(light);

			// Animation function
			function animate() {
				requestAnimationFrame(animate);
				renderer.render(scene, camera);
			}

			// Move spheres to the center and merge
			function mergeSpheres() {
				const mergeDuration = 1000;
				const startTime = Date.now();

				function update() {
					const elapsed = Date.now() - startTime;
					const t = Math.min(elapsed / mergeDuration, 1);

					spheres.forEach((sphere) => {
						sphere.position.lerp(new THREE.Vector3(0, 0, 0), t);
					});

					if (t < 1) {
						requestAnimationFrame(update);
					} else {
						bigSphere.visible = true;
						shakeBigSphere();
					}
				}
				update();
			}

			// Shake the big sphere
			function shakeBigSphere() {
				const shakeDuration = 500;
				const shakeAmplitude = 0.1;
				const shakeStartTime = Date.now();

				function shake() {
					const elapsed = Date.now() - shakeStartTime;
					const t = Math.min(elapsed / shakeDuration, 1);
					const shakeOffset = Math.sin(t * Math.PI * 10) * shakeAmplitude;

					bigSphere.position.set(shakeOffset, shakeOffset, shakeOffset);

					if (t < 1) {
						requestAnimationFrame(shake);
					} else {
						splitIntoSpheres();
					}
				}
				shake();
			}

			// Split into 6 new spheres
			function splitIntoSpheres() {
				const newSpheres = [];
				const newColors = colors.map((color) => new THREE.Color(color));

				for (let i = 0; i < 6; i++) {
					const blendedColor = new THREE.Color();
					blendedColor.r = Math.random() < 0.5 ? newColors[Math.floor(Math.random() * 4)].r : 1;
					blendedColor.g = Math.random() < 0.5 ? newColors[Math.floor(Math.random() * 4)].g : 1;
					blendedColor.b = Math.random() < 0.5 ? newColors[Math.floor(Math.random() * 4)].b : 1;

					const material = new THREE.MeshStandardMaterial({ color: blendedColor, flatShading: true });
					const sphere = new THREE.Mesh(sphereGeometry.clone().scale(0.3, 0.3, 0.3), material);
					sphere.position.set(
						2 + (Math.random() - 0.5) * 2,
						(Math.random() - 0.5) * 2,
						(Math.random() - 0.5) * 2
					);
					newSpheres.push(sphere);
					scene.add(sphere);
				}
			}

			// Start the animation
			mergeSpheres();
			animate();
		</script>
	</body>
</html>
