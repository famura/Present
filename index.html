				progress: true, // progress bar

						extensions: ["HTML.js", "color.js"], // to use custom colors via \class{}{} https://stackoverflow.com/questions/44715432/how-to-define-custom-colors-in-mathjax-in-config

							["$", "$"],
							["\\(", "\\)"],
						], // inline symbols are not working for local mathjax
						// packages: {"[+]": ["xcolor"]},

							RR: "{\\bf R}",
							trans: "{\\textsf{T}}" /* alternatively \\top or \\intercal */,

							bluephi: "{\\color{var(--bright-blue)} \\phi}",
							redRRlpatch: "{\\color{var(--bright-red)} \\RR^{l_{patch}}}",
							Wq: "W^{(q)}",
							Wk: "W^{(k)}",
							Wv: "W^{(v)}",
							pk: "p^{(k)}",
							pv: "p^{(v)}",
							redP: "{\\color{var(--bright-red)} P}" /* or\ textcolor{var(--bright-red)}{P} */,
							redpluspi: "{\\color{var(--bright-red)} + p_{i}}",
							redpluspj: "{\\color{var(--bright-red)} + p_{j}}",
							redpluspijk: "{\\color{var(--bright-red)} + p_{ij}^{(k)}}",
							redpluspijv: "{\\color{var(--bright-red)} + p_{ij}^{(v)}}",
							greypluspijq: "{\\color{var(--bright-grey)} + p_{ij}^{(v)}}",
						},
					},
					"HTML-CSS": {
						// https://docs.mathjax.org/en/v2.7-latest/options/output-processors/HTML-CSS.html#configure-html-css
						scale: 80, // adjusts the container of mathjax equations
					},
					// reveald3: {

					// 	runLastState: false, // default: true
